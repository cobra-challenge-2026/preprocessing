services:
  cobra:
    container_name: cobra_preprocessing
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      # for development purposes, mount the code directory (can be removed)
      - /project_data_2/cbct/COBRA/code/preprocessing:/code
      # change this to your data storage location
      - /project_data_2/cbct/COBRA/data:/data
      - /project_data_2/cbct/autoseg/data:/data_autoseg
    command: tail -F anything
    shm_size: '20g'
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['2']
            capabilities: [gpu]
  impact:
    container_name: impact_registration
    build:
      context: ..
      dockerfile: docker/impact_docker/Dockerfile
    volumes:
      # for development purposes, mount the code directory (can be removed)
      - /project_data_2/cbct/COBRA/code/preprocessing:/code
      # change this to your data storage location
      - /project_data_2/cbct/COBRA/data:/data
      - /project_data_2/cbct/autoseg/data:/data_autoseg
    shm_size: '20g'
    ports:
      - "8001:8000"
    entrypoint: ["uvicorn", "server:app", "--app-dir", "/code/docker/impact_docker", "--host", "0.0.0.0", "--port", "8000"]
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids: ['2']
            capabilities: [gpu]
